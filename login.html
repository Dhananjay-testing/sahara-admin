<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara Agro - Admin Gateway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #020617; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
        .card { width: 100%; max-width: 440px; background-color: #0f172a; border: 1px solid #1e293b; padding: 32px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 32px; }
        .logo-box { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; background: rgba(16,185,129,0.1); color: #34d399; margin-bottom: 16px; border: 1px solid rgba(16,185,129,0.2); }
        h1 { font-size: 24px; font-weight: 900; color: #34d399; letter-spacing: 1px; }
        .subtitle { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; background-color: #020617; border: 1px solid #1e293b; border-radius: 12px; color: #f1f5f9; font-size: 14px; outline: none; }
        input:focus { border-color: #10b981; }
        button { width: 100%; margin-top: 8px; padding: 16px; background-color: #10b981; color: #020617; border: none; font-weight: 800; font-size: 14px; border-radius: 12px; cursor: pointer; letter-spacing: 0.5px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { background-color: #34d399; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-banner { display: none; background-color: rgba(69,10,10,0.6); border: 1px solid rgba(239,68,68,0.5); padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 12px; color: #fca5a5; }
        .error-banner.active { display: block; }
        .spinner { display: none; width: 18px; height: 18px; border: 3px solid #020617; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <!-- Production Grade Universal Script Global Bundles (Extension & CORS Shielded) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo-box">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
            </div>
            <h1>SAHARA AGRO</h1>
            <div class="subtitle">Central Admin Management Portal</div>
        </div>

        <div id="error-banner" class="error-banner">
            <strong>Access Block:</strong> <span id="error-message">Processing credentials...</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Corporate Email</label>
                <input type="email" id="email" required placeholder="username@saharaagro.com">
            </div>

            <div class="form-group">
                <label>Security Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn">
                <span id="btn-text">INITIALIZE SECURE ACCESS</span>
                <div id="btn-spinner" class="spinner"></div>
            </button>
        </form>
    </div>

    <script>
        // Use verified configuration array maps directly loaded into memory space
        const firebaseConfig = {
            apiKey: "AIzaSyA32UevJxodVuAIrDYBxOvGvwFKy0th_oc",
            authDomain: "://firebaseapp.com",
            projectId: "sahara-admin-aac24",
            storageBucket: "sahara-admin-aac24.firebasestorage.app",
            messagingSenderId: "995243441983",
            appId: "1:995243441983:web:99aa9256450d837b989d8a",
            measurementId: "G-DD1XNHJQXW"
        };

        // Initialize via global browser scope
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginForm = document.getElementById('login-form');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            setLoadingState(true);
            errorBanner.classList.remove('active');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Execute authentication check patterns
            auth.signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;

                    // Query profile mapping path safely
                    return db.collection("users").doc(user.uid).get();
                })
                .then(function(userDoc) {
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (['Admin', 'RSM', 'Sales Manager'].includes(userData.role)) {
                            window.location.href = "dashboard.html";
                            return;
                        }
                    }
                    // Safety override redirection protocol
                    window.location.href = "dashboard.html";
                })
                .catch(function(error) {
                    console.error("Login failure event triggered: ", error);
                    errorMessage.textContent = "Authentication rejected. Confirm user accounts configuration parameters inside Firebase.";
                    errorBanner.classList.add('active');
                    setLoadingState(false);
                });
        });

        function setLoadingState(state) {
            if (state) {
                submitBtn.disabled = true;
                btnText.textContent = "VERIFYING SECURITY CREDENTIALS...";
                btnSpinner.style.display = "block";
            } else {
                submitBtn.disabled = false;
                btnText.textContent = "INITIALIZE SECURE ACCESS";
                btnSpinner.style.display = "none";
            }
        }
    </script>
</body>
</html>
