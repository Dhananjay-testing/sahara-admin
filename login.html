<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara Agro - Admin Gateway</title>
    <!-- Tailwind CSS CDN for instant atomic UI styling -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen text-slate-100 antialiased tracking-tight">

    <!-- Central Login Container Card -->
    <div class="w-full max-w-md p-8 bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 m-4 transition-all">
        
        <!-- Brand Header Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/10 text-emerald-400 mb-4 border border-emerald-500/20">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-black text-emerald-400 tracking-wider">SAHARA AGRO</h1>
            <p class="text-xs font-medium text-slate-400 uppercase tracking-widest mt-1">Central Admin Management Portal</p>
        </div>

        <!-- Dynamic Error Banner Response Layer -->
        <div id="error-banner" class="hidden mb-6 p-4 bg-red-950/60 border border-red-500/50 text-red-200 text-xs rounded-xl flex items-start gap-3">
            <svg class="w-5 h-5 text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <div>
                <span class="font-bold block mb-0.5">Authentication Failed</span>
                <span id="error-message">Invalid access privileges or system credentials.</span>
            </div>
        </div>

        <!-- Input Processing Form -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Corporate Email</label>
                <input type="email" id="email" required autocomplete="email"
                    class="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition text-slate-200 text-sm placeholder-slate-700" 
                    placeholder="username@saharaagro.com">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Security Password</label>
                <input type="password" id="password" required autocomplete="current-password"
                    class="w-full px-4 py-3.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition text-slate-200 text-sm placeholder-slate-700" 
                    placeholder="••••••••">
            </div>

            <!-- Submit Request Trigger Layer -->
            <button type="submit" id="submit-btn"
                class="w-full mt-2 py-4 bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 text-slate-950 font-extrabold text-sm rounded-xl transition-all shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/20 tracking-wider flex justify-center items-center gap-2">
                <span id="btn-text">INITIALIZE SECURE ACCESS</span>
                <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-slate-950" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>

    <!-- Firebase Native Browser Client Script Core Modules -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";
        import { getFirestore, doc, getDoc } from "https://gstatic.com";

        // Remember to swap these with your direct credentials inside the Firebase Web console configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_://firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_://appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById('login-form');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoadingState(true);
            hideBanner();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (!userDoc.exists()) {
                    throw new Error("No organization mapping profile discovered for this account identifier.");
                }

                const userData = userDoc.data();
                const elevatedAdminRoles = ['Admin', 'RSM', 'Sales Manager'];

                if (elevatedAdminRoles.includes(userData.role)) {
                    window.location.href = "dashboard.html";
                } else {
                    await auth.signOut();
                    throw new Error("Access Blocked. Field operator accounts are restricted to the mobile application environment.");
                }

            } catch (error) {
                let dynamicMessage = error.message;
                if (error.code === 'auth/invalid-credential') {
                    dynamicMessage = "Authentication failed. The security password or corporate identity provided is incorrect.";
                }
                showBanner(dynamicMessage);
                setLoadingState(false);
            }
        });

        function setLoadingState(state) {
            if (state) {
                submitBtn.disabled = true;
                btnText.textContent = "VERIFYING AUTHORIZATION RECORDFILE...";
                btnSpinner.classList.remove('hidden');
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                submitBtn.disabled = false;
                btnText.textContent = "INITIALIZE SECURE ACCESS";
                btnSpinner.classList.add('hidden');
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        function showBanner(text) {
            errorMessage.textContent = text;
            errorBanner.classList.remove('hidden');
        }

        function hideBanner() {
            errorBanner.classList.add('hidden');
        }
    </script>
</body>
</html>
