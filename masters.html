<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara Agro - Masters Configuration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #020617; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }
        @media (min-width: 768px) { body { flex-direction: row; } }
        
        aside { width: 100%; background-color: #0f172a; border-bottom: 1px solid #1e293b; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; shrink-0; }
        @media (min-width: 768px) { aside { width: 256px; border-bottom: none; border-right: 1px solid #1e293b; min-height: 100vh; } }
        
        .brand-title { font-size: 20px; font-weight: 900; color: #34d399; letter-spacing: 1px; margin-bottom: 4px; }
        .brand-sub { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 32px; }
        
        nav { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .nav-link { width: 100%; text-align: left; display: block; padding: 12px 16px; background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); border-radius: 12px; font-weight: 700; font-size: 14px; text-decoration: none; }
        .nav-link-inactive { width: 100%; text-align: left; display: block; padding: 12px 16px; color: #94a3b8; background: transparent; border: none; font-weight: 500; font-size: 14px; cursor: pointer; border-radius: 12px; transition: all 0.2s; }
        .nav-link-inactive:hover { background: #1e293b; color: #f1f5f9; }
        
        .logout-btn { width: 100%; margin-top: 24px; padding: 12px; background-color: #020617; color: #94a3b8; border: 1px solid #1e293b; font-weight: 700; font-size: 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.2); }
        main { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 32px; overflow-y: auto; }
        @media (min-width: 768px) { main { padding: 40px; } }
        
        .main-header { border-bottom: 1px solid #0f172a; padding-bottom: 24px; }
        h2 { font-size: 24px; font-weight: 800; }
        .sub-desc { font-size: 14px; color: #94a3b8; margin-top: 2px; }
        
        .grid-2 { display: grid; grid-template-cols: 1fr; gap: 32px; }
        @media (min-width: 1024px) { .grid-2 { grid-template-cols: repeat(2, 1fr); } }
        
        .config-card { background: #0f172a; border: 1px solid #1e293b; padding: 24px; border-radius: 16px; display: flex; flex-direction: column; gap: 20px; }
        .config-title { font-size: 14px; font-weight: 800; text-transform: uppercase; color: #34d399; letter-spacing: 0.5px; border-left: 3px solid #10b981; padding-left: 8px; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-row { display: grid; grid-template-cols: repeat(2, 1fr); gap: 16px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px 16px; background: #020617; border: 1px solid #1e293b; border-radius: 12px; color: #fff; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: #10b981; }
        
        .btn { width: 100%; padding: 16px; background: #10b981; color: #020617; border: none; font-weight: 800; font-size: 12px; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: center; align-items: center; gap: 8px; transition: background 0.2s; }
        .btn:hover { background: #34d399; }
        
        .badge-container { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 8px; }
        .badge-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 8px 14px; background: #020617; border: 1px solid #1e293b; color: #34d399; border-radius: 10px; }
        .badge-del { color: #f87171; cursor: pointer; margin-left: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <!-- Left Sidebar Menu -->
    <aside>
        <div>
            <div class="brand-title">SAHARA AGRO</div>
            <div class="brand-sub">Admin Management Hub</div>
            <nav>
                <button onclick="window.location.href='dashboard.html'" class="nav-link-inactive">Overview Dashboard</button>
                <a href="masters.html" class="nav-link">Masters Config</a>
                <button onclick="window.location.href='reports.html'" class="nav-link-inactive">Field Reports Logs</button>
            </nav>
        </div>
        <div>
            <button id="logout-btn" class="logout-btn">DISCONNECT SESSION</button>
        </div>
    </aside>

    <!-- Main Live Workspace Panel Viewport -->
    <main>
        <div class="main-header">
            <h2>Masters & Configuration Rules</h2>
            <div class="sub-desc">Define structural frameworks, allowance thresholds, and active catalog indexes</div>
        </div>

        <div class="grid-2">
            <!-- Account Hierarchy Master -->
            <div class="config-card">
                <div class="config-title">Deploy Corporate Account Hierarchy</div>
                <form id="hierarchy-form" onsubmit="return false;">
                    <div class="form-group">
                        <label>Full Employee Name</label>
                        <input type="text" id="emp-name" placeholder="Ex: Amit Sharma" required>
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <label>Corporate Identity Email</label>
                        <input type="email" id="emp-email" placeholder="sharma@saharaagro.com" required>
                    </div>
                    <div class="form-row" style="margin-top: 12px;">
                        <div class="form-group">
                            <label>Organizational Role</label>
                            <select id="emp-role">
                                <option value="RSM">RSM (Regional Manager)</option>
                                <option value="Sales Manager">Sales Manager</option>
                                <option value="Sales Person">Sales Person</option>
                                <option value="Assistant">Field Assistant</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Assign Zone Region</label>
                            <input type="text" id="emp-zone" placeholder="Ex: West-Zone" required>
                        </div>
                    </div>
                    <button type="button" id="save-user-btn" class="btn" style="margin-top: 20px;">PROVISION EMPLOYEE PROFILE</button>
                </form>
            </div>
            <!-- Allowance Rules and Crop Records Masters -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Allowances Card -->
                <div class="config-card">
                    <div class="config-title">Financial Allowance Rules</div>
                    <form id="allowance-form" onsubmit="return false;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Travel Rate (Per KM)</label>
                                <input type="number" step="0.1" id="rate-km" placeholder="Ex: 8.50" required>
                            </div>
                            <div class="form-group">
                                <label>Daily Calling Cap</label>
                                <input type="number" id="call-cap" placeholder="Ex: 250" required>
                            </div>
                        </div>
                        <button type="button" id="save-allowance-btn" class="btn" style="margin-top: 12px;">COMMIT ALLOWANCE COEFFICIENTS</button>
                    </form>
                </div>

                <!-- Product Catalog Card -->
                <div class="config-card">
                    <div class="config-title">Product & Target Crop Catalogs</div>
                    <div class="form-group">
                        <label>Append New Crop Registration</label>
                        <div style="display: flex; gap: 12px;">
                            <input type="text" id="crop-input" placeholder="Ex: Wheat / Cotton" style="flex: 1;">
                            <button type="button" id="append-crop-btn" class="btn" style="width: auto; padding: 14px 24px;">APPEND</button>
                        </div>
                    </div>
                    <div class="badge-container" id="crop-wrapper">
                        <!-- Cached profile array badges render directly in this layout frame slot -->
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // Enforce administrative session verification access tokens override bounds pass
        const sessionActive = localStorage.getItem('sahara_admin_session_override');
        if (!sessionActive) {
            window.location.href = "login.html";
        }

        // Initialize local profile tracking array data storage fallback structures
        let cachedCropsList = JSON.parse(localStorage.getItem('sahara_masters_crops')) || ["Wheat", "Cotton", "Rice", "Sugarcane"];
        
        renderCropBadges();

        // Account provisioning handling simulation logic
        document.getElementById('save-user-btn').addEventListener('click', function() {
            const name = document.getElementById('emp-name').value.trim();
            const email = document.getElementById('emp-email').value.trim();
            const role = document.getElementById('emp-role').value;
            const zone = document.getElementById('emp-zone').value.trim();

            if(!name || !email || !zone) {
                alert("Please fill all operational parameters fields before provisioning account hierarchy.");
                return;
            }

            alert("Hierarchy Mapping Document Verified: System configuration parameters allocated for " + name + " assigned to role context [" + role + "].");
            document.getElementById('hierarchy-form').reset();
        });

        // Allowance configuration parameter rules commitment tracking mapping logic
        document.getElementById('save-allowance-btn').addEventListener('click', function() {
            const rate = document.getElementById('rate-km').value;
            const cap = document.getElementById('call-cap').value;

            if(!rate || !cap) {
                alert("Please declare complete finance parameters metrics fields.");
                return;
            }

            alert("Financial Constraints Track Saved: Distance rate parameters set to INR " + rate + "/KM with calling data caps at INR " + cap + ".");
        });

        // Crop catalog badge mutations mapping tools
        document.getElementById('append-crop-btn').addEventListener('click', function() {
            const input = document.getElementById('crop-input');
            const newCrop = input.value.trim();

            if(!newCrop) return;

            if(cachedCropsList.includes(newCrop)) {
                alert("Target catalog definition parameter entity already mapped.");
                return;
            }

            cachedCropsList.push(newCrop);
            localStorage.setItem('sahara_masters_crops', JSON.stringify(cachedCropsList));
            input.value = "";
            renderCropBadges();
        });

        function renderCropBadges() {
            const container = document.getElementById('crop-wrapper');
            container.innerHTML = "";

            cachedCropsList.forEach(function(crop, index) {
                const badge = document.createElement('div');
                badge.className = "badge-item";
                badge.innerHTML = crop + `<span class="badge-del" onclick="removeCropElement(${index})">×</span>`;
                container.appendChild(badge);
            });
        }

        window.removeCropElement = function(index) {
            cachedCropsList.splice(index, 1);
            localStorage.setItem('sahara_masters_crops', JSON.stringify(cachedCropsList));
            renderCropBadges();
        };

        // Terminate security tracking session trace
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('sahara_admin_session_override');
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
